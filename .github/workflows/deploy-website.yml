name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate env config from repository secrets
        working-directory: website
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LICENSE_API_BASE: ${{ secrets.LICENSE_API_BASE }}
          APP_DOWNLOAD_URL: ${{ secrets.APP_DOWNLOAD_URL }}
          LEMONSQUEEZY_CHECKOUT_PRO: ${{ secrets.LEMONSQUEEZY_CHECKOUT_PRO }}
          LEMONSQUEEZY_CHECKOUT_LIVE_PASS: ${{ secrets.LEMONSQUEEZY_CHECKOUT_LIVE_PASS }}
          LEMONSQUEEZY_CUSTOMER_PORTAL: ${{ secrets.LEMONSQUEEZY_CUSTOMER_PORTAL }}
        run: node generate-env-config.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
