name: release (linux)

# Linux Tauri bundle — part of the per-platform release architecture
# (release-mac.yml, release-windows.yml, release-linux.yml).
#
# Why separate: the Linux `cargo tauri build` step takes 30+ min on a
# stock ubuntu-22.04 runner (cold WebKit2GTK link, 400-crate compile).
# Running it alongside mac + windows would block the fast path to
# publishing macOS DMGs / Windows MSIs.
#
# Triggers:
#   - workflow_dispatch — manual rebuild against any tag
#   - push tag v* — auto-fires in parallel with release-mac.yml +
#     release-windows.yml. Linux is treated as OPTIONAL by the
#     promote-if-complete check, so mac+windows can flip the public
#     release to "latest" without waiting for Linux. Once Linux
#     finishes (10-20 min later), it appends its .AppImage / .deb
#     to the already-published release.
#
# Tier 1 caches: sccache + PyInstaller dist + ONNX model.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build Linux artifacts for (e.g. v0.1.4)'
        required: true
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Install Linux WebKit + libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps
        shell: bash
        run: uv sync --frozen --all-extras || uv sync --all-extras

      - name: Cache ONNX MiniLM embedding model
        uses: actions/cache@v4
        with:
          path: scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz
          key: onnx-minilm-l6-v2-v1

      - name: Pre-download ONNX MiniLM (if not cached)
        shell: bash
        run: |
          mkdir -p scripts/onnx-model-cache/all-MiniLM-L6-v2
          if [ ! -f scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz ]; then
            curl -fsSL --retry 3 --retry-delay 2 \
              -o scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz \
              https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz
          else
            echo "  ✓ ONNX tarball restored from cache"
          fi
          ls -lh scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz

      - name: Cache PyInstaller dist
        id: pyi-cache
        uses: actions/cache@v4
        with:
          path: dist/gapmap-cli
          key: pyinstaller-linux-${{ hashFiles('gapmap-cli.spec', 'pyproject.toml', 'uv.lock', 'src/**/*.py') }}

      - name: Build gapmap-cli sidecar (PyInstaller)
        if: steps.pyi-cache.outputs.cache-hit != 'true'
        shell: bash
        run: uv run pyinstaller gapmap-cli.spec

      - name: Stage sidecar binary
        shell: bash
        run: |
          mkdir -p app-tauri/src-tauri/binaries
          cp dist/gapmap-cli app-tauri/src-tauri/binaries/gapmap-cli-x86_64-unknown-linux-gnu
          chmod +x app-tauri/src-tauri/binaries/gapmap-cli-x86_64-unknown-linux-gnu

      # Linux doesn't ship ffmpeg as a sidecar yet — strip the externalBin
      # reference so `cargo tauri build` doesn't fail looking for it.
      - name: Strip ffmpeg externalBin
        shell: bash
        run: |
          cd app-tauri/src-tauri
          python3 -c "import json, pathlib; p=pathlib.Path('tauri.conf.json'); d=json.loads(p.read_text()); d['bundle']['externalBin']=[b for b in d['bundle']['externalBin'] if 'ffmpeg' not in b]; p.write_text(json.dumps(d, indent=2))"

      # JWT secret + Node/Rust toolchains
      - name: Set JWT_DESKTOP_SECRET fallback
        shell: bash
        run: |
          if [ -z "${{ secrets.JWT_DESKTOP_SECRET }}" ]; then
            echo "JWT_DESKTOP_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV
          else
            echo "JWT_DESKTOP_SECRET=${{ secrets.JWT_DESKTOP_SECRET }}" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app-tauri/src-tauri -> target
          shared-key: linux-tauri

      - name: Install frontend deps
        working-directory: ./app-tauri
        run: npm ci

      # Append Linux artifacts (.deb / .rpm / .AppImage) to the gap-map-pro
      # release draft (whichever platform workflow created it first).
      - name: Build and append Linux bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_DESKTOP_SECRET: ${{ env.JWT_DESKTOP_SECRET }}
        with:
          projectPath: ./app-tauri
          tagName: v__VERSION__
          releaseName: Gap Map v__VERSION__
          releaseDraft: true
          prerelease: false
          args: ''

      # ---------- Publish to public repo ----------
      - name: Publish linux artifact to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          GH_TOKEN_SRC: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ env.TAG_NAME }}
          PUBLIC: ${{ vars.PUBLIC_RELEASE_REPO || 'myind-ai/gapmap' }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PUBLIC_RELEASE_TOKEN not set — skipping public publish"
            exit 0
          fi
          mkdir -p ./pub
          GH_TOKEN="$GH_TOKEN_SRC" gh release download "$VER" \
            --repo "${{ github.repository }}" --dir ./pub \
            --pattern "Gap.Map_*_amd64.AppImage" \
            --pattern "Gap.Map_*_amd64.deb" \
            --pattern "Gap.Map_*_x86_64.rpm" 2>&1 | tail -5 || true
          ls -lh ./pub/ | head -10

          # Rename to user-friendly public-convention names. Linux only
          # builds x86_64 today; if/when arm64 Linux lands, extend this
          # block + the FILES glob + the parent download patterns above.
          # Keep in sync with release-mac.yml, release-windows.yml, and
          # scripts/promote-release-if-complete.sh.
          cd ./pub
          NUM="${VER#v}"
          if [ -f "Gap.Map_${NUM}_amd64.AppImage" ]; then
            mv "Gap.Map_${NUM}_amd64.AppImage" "Gap-Map-${NUM}-Linux.AppImage"
          fi
          if [ -f "Gap.Map_${NUM}_amd64.deb" ]; then
            mv "Gap.Map_${NUM}_amd64.deb" "Gap-Map-${NUM}-Linux.deb"
          fi
          if [ -f "Gap.Map_${NUM}_x86_64.rpm" ]; then
            mv "Gap.Map_${NUM}_x86_64.rpm" "Gap-Map-${NUM}-Linux.rpm"
          fi
          ls -lh

          if ! gh release view "$VER" --repo "$PUBLIC" >/dev/null 2>&1; then
            NOTES=$'## Gap Map '"$VER"$'\n\n**Download → [gapmap.myind.ai](https://gapmap.myind.ai/)**\n\nInstallers:\n\n- **macOS Apple Silicon** — `Gap-Map-*-macOS-Apple-Silicon.dmg`\n- **macOS Intel** — `Gap-Map-*-macOS-Intel.dmg`\n- **Windows** — `Gap-Map-*-Windows.msi` (managed deploy) or `Gap-Map-*-Windows-Installer.exe` (click-to-install)\n- **Linux** — `Gap-Map-*-Linux.AppImage` (portable) or `Gap-Map-*-Linux.deb` (Debian/Ubuntu APT)\n\nSee the [source repo](https://github.com/shaantanu9/gap-map-pro) `changelogs/` folder for what changed.'
            gh release create "$VER" --repo "$PUBLIC" --target main --draft \
              --title "Gap Map $VER" \
              --notes "$NOTES"
            echo "  ✓ created draft on $PUBLIC"
          fi

          shopt -s nullglob
          FILES=(Gap-Map-*-Linux.AppImage Gap-Map-*-Linux.deb Gap-Map-*-Linux.rpm)
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$VER" --repo "$PUBLIC" "${FILES[@]}" --clobber
            echo "  ✓ uploaded ${#FILES[@]} linux artifact(s)"
          fi

      # ---------- Promote if all platforms uploaded ----------
      # Linux is OPTIONAL in the promote check (mac + windows alone can
      # promote). This run typically lands AFTER the release is already
      # latest-published, in which case the inlined logic below is a no-op.
      # Inlined — see release-mac.yml for why (script-file-missing
      # protection when checkout is pinned to a pre-fix tag).
      - name: Promote release to latest if all platforms are uploaded
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          VER: ${{ env.TAG_NAME }}
          PUBLIC: ${{ vars.PUBLIC_RELEASE_REPO || 'myind-ai/gapmap' }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then exit 0; fi
          echo "── promote-if-complete: $VER on $PUBLIC ──"
          ASSETS=$(gh release view "$VER" --repo "$PUBLIC" --json assets --jq '.assets[].name' 2>/dev/null) || {
            echo "  release $VER not found on $PUBLIC — nothing to promote"; exit 0
          }
          echo "  current assets:"; echo "$ASSETS" | sed 's/^/    - /'
          # Required patterns — friendly names produced by all 3 platform
          # workflows' rename steps. Linux artifacts are NOT required for
          # promote; mac+windows alone are enough. Keep in sync with
          # release-mac.yml, release-windows.yml, scripts/promote-...sh.
          REQUIRED=(
            '-macOS-Apple-Silicon\.dmg$'
            '-macOS-Intel\.dmg$'
            '-Windows\.msi$|-Windows-Installer\.exe$'
          )
          MISSING=()
          for pat in "${REQUIRED[@]}"; do
            echo "$ASSETS" | grep -qE "$pat" || MISSING+=("$pat")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "  ⏳ waiting on missing platforms:"
            for m in "${MISSING[@]}"; do echo "    - $m"; done
            echo "  release stays draft. NOT promoting."; exit 0
          fi
          IS_DRAFT=$(gh release view "$VER" --repo "$PUBLIC" --json isDraft --jq '.isDraft' 2>/dev/null)
          if [ "$IS_DRAFT" = "true" ]; then
            echo "  ✓ all required platforms present — flipping draft → latest published"
            gh release edit "$VER" --repo "$PUBLIC" --draft=false --latest
            echo "  ✓ promoted $VER to latest on $PUBLIC"
          else
            echo "  already published — nothing to do"
          fi
