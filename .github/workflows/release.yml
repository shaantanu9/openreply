name: release

# Tag-driven release: push a tag like `v0.1.0` to trigger a cross-platform build.
# Also runnable on demand via the Actions tab (workflow_dispatch).
#
# Each platform builds its own PyInstaller sidecar, copies it into
# app-tauri/src-tauri/binaries/, then runs `tauri build` and uploads the
# resulting bundle to a GitHub Release.
#
# Signing env vars (APPLE_*, TAURI_SIGNING_*) are wired up but optional —
# set them as repo secrets to get signed/notarized artifacts. Unset = unsigned.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Opt in to Node 24 for JavaScript actions. As of mid-2026 GitHub flags every
# v4/v5 action that still ships a Node 20 runtime ("Node.js 20 actions are
# deprecated") — pinning forward silences that noise so the only warnings
# left in a clean run are upstream-dep ones we can't fix here. Set at
# workflow scope so every job (mac arm64/x86_64, linux, windows) inherits.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}
    # Job-level env hoisted so step `if:` can reference it. Actions doesn't
    # allow `secrets.X` in step conditions, but it does allow `env.X`.
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && 'yes' || 'no' }}
    steps:
      - uses: actions/checkout@v4

      # ---------- Linux system deps ----------
      - name: Install Linux WebKit + libs
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ---------- Python sidecar build ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps
        shell: bash
        # `--all-extras` is critical — pyinstaller lives under [project.optional-
        # dependencies] dev, so without it `uv run pyinstaller` errors out with
        # "Failed to spawn: No such file or directory". The frozen sync may
        # fail on uv.lock drift; fall back to a fresh resolution.
        run: |
          uv sync --frozen --all-extras || uv sync --all-extras

      # Pre-download the ONNX MiniLM embedding model BEFORE the spec runs.
      # The spec has logic to auto-download but its stdout `print()` calls
      # get captured by PyInstaller's spec-evaluation context on CI and
      # we can't observe whether it succeeded. Doing it explicitly via
      # curl makes the step verifiable (exit code + file size) and lets
      # the spec's "file already exists, skip download" branch take over.
      # The 83MB tarball is gitignored so CI runners always need this.
      - name: Pre-download ONNX MiniLM embedding model
        shell: bash
        run: |
          mkdir -p scripts/onnx-model-cache/all-MiniLM-L6-v2
          curl -fsSL --retry 3 --retry-delay 2 \
            -o scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz \
            https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz
          ls -lh scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz

      # IMPORTANT: use the .spec file, not inline flags. The spec bundles
      # the 83MB ONNX MiniLM embedding model so semantic search works
      # offline on a fresh install. It also runs explicit `collect_all`
      # for every lazy-imported source dep (google_play_scraper, pytrends,
      # feedparser, lxml, pypdf, pandas, scipy, networkx, sgmllib3k).
      # Without the spec, sidecar ships ~120MB lighter but fresh users
      # have to download ONNX on first use and any source adapter using
      # a lazy import inside a function body fails silently.
      - name: Build gapmap-cli sidecar (PyInstaller) — Unix
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          uv run pyinstaller gapmap-cli.spec
          mkdir -p app-tauri/src-tauri/binaries
          cp dist/gapmap-cli app-tauri/src-tauri/binaries/gapmap-cli-${{ matrix.target }}
          chmod +x app-tauri/src-tauri/binaries/gapmap-cli-${{ matrix.target }}

      - name: Build gapmap-cli sidecar (PyInstaller) — Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          uv run pyinstaller gapmap-cli.spec
          New-Item -ItemType Directory -Force -Path app-tauri/src-tauri/binaries | Out-Null
          Copy-Item dist/gapmap-cli.exe "app-tauri/src-tauri/binaries/gapmap-cli-${{ matrix.target }}.exe"

      # ---------- ffmpeg sidecar (macOS only) ----------
      # tauri.conf.json declares ffmpeg as externalBin. It's gitignored, so
      # CI must fetch it before `cargo tauri build`. fetch-ffmpeg.sh picks
      # the matching arch and downloads from osxexperts.net / evermeet.cx.
      # For Linux + Windows we don't ship ffmpeg as a sidecar yet — the
      # Ingest-video feature degrades gracefully when ffmpeg isn't present.
      - name: Fetch ffmpeg sidecar (macOS arm64)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: bash scripts/fetch-ffmpeg.sh arm64

      - name: Fetch ffmpeg sidecar (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: bash scripts/fetch-ffmpeg.sh x86_64

      # On Linux + Windows, drop the ffmpeg externalBin reference so the
      # bundle build doesn't try to find a missing binary. (jq for Linux,
      # python for Windows since both runners have them preinstalled.)
      - name: Strip ffmpeg externalBin on non-macOS
        if: matrix.platform != 'macos-latest'
        shell: bash
        run: |
          cd app-tauri/src-tauri
          python3 -c "import json, pathlib; p=pathlib.Path('tauri.conf.json'); d=json.loads(p.read_text()); d['bundle']['externalBin']=[b for b in d['bundle']['externalBin'] if 'ffmpeg' not in b]; p.write_text(json.dumps(d, indent=2))"
          echo '— externalBin after strip —'
          python3 -c "import json; print(json.loads(open('tauri.conf.json').read())['bundle']['externalBin'])"

      # JWT_DESKTOP_SECRET is baked into the binary at compile time (build.rs).
      # If the repo secret isn't set (e.g. open-source forks, unsigned builds),
      # generate a random one so the release build doesn't panic. The license-
      # activation flow won't work without a real stable secret — see LAUNCH.md.
      - name: Set JWT_DESKTOP_SECRET fallback if not provided
        shell: bash
        run: |
          if [ -z "${{ secrets.JWT_DESKTOP_SECRET }}" ]; then
            echo "JWT_DESKTOP_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV
          else
            echo "JWT_DESKTOP_SECRET=${{ secrets.JWT_DESKTOP_SECRET }}" >> $GITHUB_ENV
          fi

      # ---------- Node + Rust toolchains ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app-tauri/src-tauri -> target

      - name: Install frontend deps
        working-directory: ./app-tauri
        run: npm ci

      # ---------- Tauri build + upload ----------
      # Two parallel step definitions — only one fires per run based on
      # whether the APPLE_CERTIFICATE secret is set. Empty `env:` strings
      # to tauri-action break codesign on macOS (tauri-bundler reads
      # APPLE_SIGNING_IDENTITY="" and still tries to security-import
      # an empty .p12). Hard split avoids the trap.
      - name: Build and release Tauri bundle (signed)
        if: env.HAS_APPLE_CERT == 'yes'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # JWT_DESKTOP_SECRET is set by the fallback step above — always present.
          JWT_DESKTOP_SECRET: ${{ env.JWT_DESKTOP_SECRET }}
          # macOS code signing + notarization — all set together here.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./app-tauri
          tagName: v__VERSION__
          releaseName: Gap Map v__VERSION__
          releaseBody: |
            Download the installer for your platform below.

            - macOS (Apple Silicon): `*_aarch64.dmg`
            - macOS (Intel): `*_x64.dmg`
            - Windows: `*_x64_en-US.msi` / `*_x64-setup.exe`
            - Linux: `*.AppImage` / `*.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build and release Tauri bundle (unsigned)
        if: env.HAS_APPLE_CERT == 'no'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_DESKTOP_SECRET: ${{ env.JWT_DESKTOP_SECRET }}
        with:
          projectPath: ./app-tauri
          tagName: v__VERSION__
          releaseName: Gap Map v__VERSION__ (unsigned)
          releaseBody: |
            **Unsigned build** — for testing only. macOS will warn on first
            launch (right-click → Open to bypass Gatekeeper).

            - macOS (Apple Silicon): `*_aarch64.dmg`
            - macOS (Intel): `*_x64.dmg`
            - Windows: `*_x64_en-US.msi` / `*_x64-setup.exe`
            - Linux: `*.AppImage` / `*.deb`
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
