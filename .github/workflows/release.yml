name: release

# Tag-driven release for macOS (arm64 + x86_64) + Windows.
# Push a tag like `v0.1.0` → this workflow fires.
#
# Linux is intentionally NOT in this matrix — the Linux Tauri compile
# (no sccache, cold WebKit2GTK link) takes 30+ min and blocks the fast
# path to publishing macOS DMGs / Windows MSIs. It runs as a separate
# workflow (`.github/workflows/release-linux.yml`) so the platforms
# that ship publicly (mac arm64 → myind-ai/gapmap) don't wait on it.
# Trigger the Linux build manually via the Actions tab → "release (linux)"
# → "Run workflow" with the tag name.
#
# Each platform builds its own PyInstaller sidecar, copies it into
# app-tauri/src-tauri/binaries/, then runs `tauri build` and uploads
# the resulting bundle to the same GitHub Release object.
#
# Signing env vars (APPLE_*, TAURI_SIGNING_*) are wired up but optional —
# set them as repo secrets to get signed/notarized artifacts. Unset = unsigned.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Opt in to Node 24 for JavaScript actions. As of mid-2026 GitHub flags every
# v4/v5 action that still ships a Node 20 runtime ("Node.js 20 actions are
# deprecated") — pinning forward silences that noise so the only warnings
# left in a clean run are upstream-dep ones we can't fix here. Set at
# workflow scope so every job (mac arm64/x86_64, linux, windows) inherits.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          # Linux moved to .github/workflows/release-linux.yml — see header
          # for the reasoning. Re-add here once sccache / a faster runner
          # brings Linux Tauri-bundle time under 10 min.

    runs-on: ${{ matrix.platform }}
    # Job-level env hoisted so step `if:` can reference it. Actions doesn't
    # allow `secrets.X` in step conditions, but it does allow `env.X`.
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && 'yes' || 'no' }}
    steps:
      - uses: actions/checkout@v4

      # ---------- Linux system deps ----------
      - name: Install Linux WebKit + libs
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ---------- Python sidecar build ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps
        shell: bash
        # `--all-extras` is critical — pyinstaller lives under [project.optional-
        # dependencies] dev, so without it `uv run pyinstaller` errors out with
        # "Failed to spawn: No such file or directory". The frozen sync may
        # fail on uv.lock drift; fall back to a fresh resolution.
        run: |
          uv sync --frozen --all-extras || uv sync --all-extras

      # Pre-download the ONNX MiniLM embedding model BEFORE the spec runs.
      # The spec has logic to auto-download but its stdout `print()` calls
      # get captured by PyInstaller's spec-evaluation context on CI and
      # we can't observe whether it succeeded. Doing it explicitly via
      # curl makes the step verifiable (exit code + file size) and lets
      # the spec's "file already exists, skip download" branch take over.
      # The 83MB tarball is gitignored so CI runners always need this.
      - name: Pre-download ONNX MiniLM embedding model
        shell: bash
        run: |
          mkdir -p scripts/onnx-model-cache/all-MiniLM-L6-v2
          curl -fsSL --retry 3 --retry-delay 2 \
            -o scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz \
            https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz
          ls -lh scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz

      # IMPORTANT: use the .spec file, not inline flags. The spec bundles
      # the 83MB ONNX MiniLM embedding model so semantic search works
      # offline on a fresh install. It also runs explicit `collect_all`
      # for every lazy-imported source dep (google_play_scraper, pytrends,
      # feedparser, lxml, pypdf, pandas, scipy, networkx, sgmllib3k).
      # Without the spec, sidecar ships ~120MB lighter but fresh users
      # have to download ONNX on first use and any source adapter using
      # a lazy import inside a function body fails silently.
      - name: Build gapmap-cli sidecar (PyInstaller) — Unix
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          uv run pyinstaller gapmap-cli.spec
          mkdir -p app-tauri/src-tauri/binaries
          cp dist/gapmap-cli app-tauri/src-tauri/binaries/gapmap-cli-${{ matrix.target }}
          chmod +x app-tauri/src-tauri/binaries/gapmap-cli-${{ matrix.target }}

      - name: Build gapmap-cli sidecar (PyInstaller) — Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          uv run pyinstaller gapmap-cli.spec
          New-Item -ItemType Directory -Force -Path app-tauri/src-tauri/binaries | Out-Null
          Copy-Item dist/gapmap-cli.exe "app-tauri/src-tauri/binaries/gapmap-cli-${{ matrix.target }}.exe"

      # ---------- ffmpeg sidecar (macOS only) ----------
      # tauri.conf.json declares ffmpeg as externalBin. It's gitignored, so
      # CI must fetch it before `cargo tauri build`. fetch-ffmpeg.sh picks
      # the matching arch and downloads from osxexperts.net / evermeet.cx.
      # For Linux + Windows we don't ship ffmpeg as a sidecar yet — the
      # Ingest-video feature degrades gracefully when ffmpeg isn't present.
      - name: Fetch ffmpeg sidecar (macOS arm64)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: bash scripts/fetch-ffmpeg.sh arm64

      - name: Fetch ffmpeg sidecar (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: bash scripts/fetch-ffmpeg.sh x86_64

      # On Linux + Windows, drop the ffmpeg externalBin reference so the
      # bundle build doesn't try to find a missing binary. (jq for Linux,
      # python for Windows since both runners have them preinstalled.)
      - name: Strip ffmpeg externalBin on non-macOS
        if: matrix.platform != 'macos-latest'
        shell: bash
        run: |
          cd app-tauri/src-tauri
          python3 -c "import json, pathlib; p=pathlib.Path('tauri.conf.json'); d=json.loads(p.read_text()); d['bundle']['externalBin']=[b for b in d['bundle']['externalBin'] if 'ffmpeg' not in b]; p.write_text(json.dumps(d, indent=2))"
          echo '— externalBin after strip —'
          python3 -c "import json; print(json.loads(open('tauri.conf.json').read())['bundle']['externalBin'])"

      # JWT_DESKTOP_SECRET is baked into the binary at compile time (build.rs).
      # If the repo secret isn't set (e.g. open-source forks, unsigned builds),
      # generate a random one so the release build doesn't panic. The license-
      # activation flow won't work without a real stable secret — see LAUNCH.md.
      - name: Set JWT_DESKTOP_SECRET fallback if not provided
        shell: bash
        run: |
          if [ -z "${{ secrets.JWT_DESKTOP_SECRET }}" ]; then
            echo "JWT_DESKTOP_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV
          else
            echo "JWT_DESKTOP_SECRET=${{ secrets.JWT_DESKTOP_SECRET }}" >> $GITHUB_ENV
          fi

      # Materialize the App Store Connect API key (.p8) from the inlined
      # secret content. We can't store a file path in a secret, only the
      # content, so each macOS job writes it to a runner-local file at
      # the start and exports APPLE_API_KEY_PATH so tauri-action picks it
      # up. Skipped on non-mac runners.
      - name: Materialize APPLE_API_KEY_PATH from secret content
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'yes'
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          if [ -z "$APPLE_API_KEY_CONTENT" ]; then
            echo "::warning::APPLE_API_KEY_CONTENT secret is empty — notarytool will fall back to Apple-ID auth"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/asc-keys"
          KEY_PATH="$RUNNER_TEMP/asc-keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> $GITHUB_ENV
          echo "  ✓ wrote $KEY_PATH"

      # ---------- Node + Rust toolchains ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app-tauri/src-tauri -> target

      - name: Install frontend deps
        working-directory: ./app-tauri
        run: npm ci

      # ---------- Tauri build + upload ----------
      # Two parallel step definitions — only one fires per run based on
      # whether the APPLE_CERTIFICATE secret is set. Empty `env:` strings
      # to tauri-action break codesign on macOS (tauri-bundler reads
      # APPLE_SIGNING_IDENTITY="" and still tries to security-import
      # an empty .p12). Hard split avoids the trap.
      - name: Build and release Tauri bundle (signed)
        if: env.HAS_APPLE_CERT == 'yes'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # JWT_DESKTOP_SECRET is set by the fallback step above — always present.
          JWT_DESKTOP_SECRET: ${{ env.JWT_DESKTOP_SECRET }}
          # macOS code signing.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarization via App Store Connect API key — preferred over
          # APPLE_ID + APPLE_PASSWORD for CI per Apple's docs. The .p8
          # content is inlined as APPLE_API_KEY_CONTENT (secret) and
          # materialized to a file path at job start (step above).
          #
          # CRITICAL: we intentionally do NOT pass APPLE_ID + APPLE_PASSWORD
          # here. tauri-bundler's notarization picker prefers Apple-ID auth
          # over API-key auth when APPLE_ID is set, even if APPLE_PASSWORD
          # is missing — that lands a 401 "Invalid credentials" because the
          # app-specific password isn't there. Leaving APPLE_ID out forces
          # the API-key path that we actually have working creds for.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./app-tauri
          tagName: v__VERSION__
          releaseName: Gap Map v__VERSION__
          releaseBody: |
            Download the installer for your platform below.

            - macOS (Apple Silicon): `*_aarch64.dmg`
            - macOS (Intel): `*_x64.dmg`
            - Windows: `*_x64_en-US.msi` / `*_x64-setup.exe`
            - Linux: `*.AppImage` / `*.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build and release Tauri bundle (unsigned)
        if: env.HAS_APPLE_CERT == 'no'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_DESKTOP_SECRET: ${{ env.JWT_DESKTOP_SECRET }}
        with:
          projectPath: ./app-tauri
          tagName: v__VERSION__
          releaseName: Gap Map v__VERSION__ (unsigned)
          releaseBody: |
            **Unsigned build** — for testing only. macOS will warn on first
            launch (right-click → Open to bypass Gatekeeper).

            - macOS (Apple Silicon): `*_aarch64.dmg`
            - macOS (Intel): `*_x64.dmg`
            - Windows: `*_x64_en-US.msi` / `*_x64-setup.exe`
            - Linux: `*.AppImage` / `*.deb`
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      # ── Post-build signing audit (macOS only) ──────────────────────────
      # If APPLE_CERTIFICATE was set, the build above ran the SIGNED path
      # and the produced .app should have Developer ID authority. Verify
      # it explicitly so a future secret rotation (or accidentally
      # unsetting the secret) doesn't silently downgrade us to ad-hoc.
      # If APPLE_CERTIFICATE was NOT set we print a loud warning so it's
      # obvious in the logs that this run shipped unsigned artifacts.
      - name: Audit macOS signature (warn loud if not Developer ID)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          BUNDLE_DIR="app-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::warning::no .app bundle found at $BUNDLE_DIR — cannot audit signature"
            exit 0
          fi
          echo "Auditing: $APP"
          OUT=$(codesign -dv --verbose=2 "$APP" 2>&1 || true)
          echo "$OUT"
          if echo "$OUT" | grep -q "Authority=Developer ID Application"; then
            echo "::notice::macOS bundle properly signed with Developer ID"
            exit 0
          fi
          if echo "$OUT" | grep -q "Signature=adhoc"; then
            echo "::warning title=Unsigned macOS bundle::This build is AD-HOC SIGNED, not Developer ID. Users will hit Gatekeeper. Set APPLE_CERTIFICATE + related secrets, or sign locally via scripts/publish-mac.sh --sign before publishing."
          else
            echo "::warning title=Unknown signature state::codesign output did not contain Developer ID or adhoc markers — manual inspection required."
          fi

  # ─── Auto-publish to the public release repo ────────────────────────────────
  # Runs after `release` (the build matrix) finishes. Downloads the signed
  # artifacts from THIS repo's draft, renames them to the public-facing
  # convention (aarch64→arm64, .app.tar.gz → ditto-zipped .zip), uploads to
  # the public repo's release, applies friendly labels, and flips
  # draft→published with --latest.
  #
  # Requires two extra repo secrets (one-time setup via scripts/setup-ci.sh):
  #   PUBLIC_RELEASE_TOKEN  classic PAT or fine-grained PAT with
  #                         `contents: write` on the public release repo
  #   PUBLIC_RELEASE_REPO   "<owner>/<repo>" of the public release target
  #                         (defaults to myind-ai/gapmap)
  publish-public:
    needs: [release]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.release.result == 'success' && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
    env:
      VER: ${{ github.ref_name }}
      PUBLIC: ${{ vars.PUBLIC_RELEASE_REPO || 'myind-ai/gapmap' }}
      # PUBLIC_RELEASE_TOKEN must be set as a secret. Has to be a PAT/fine-
      # grained-token with write access to PUBLIC, since the default
      # GITHUB_TOKEN can't write across repos.
      GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
    steps:
      - name: Sanity check
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PUBLIC_RELEASE_TOKEN secret is not set — run scripts/setup-ci.sh to configure it"
            exit 1
          fi
          echo "  source repo: ${{ github.repository }}"
          echo "  public repo: $PUBLIC"
          echo "  tag:         $VER"

      - name: Download signed artifacts from this repo's draft release
        env:
          GH_TOKEN_SRC: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./pub
          # Use the default token to read from this repo's release (it has
          # contents:read by default).
          GH_TOKEN="$GH_TOKEN_SRC" gh release download "$VER" \
            --repo "${{ github.repository }}" \
            --dir ./pub \
            --pattern "Gap.Map_*_aarch64.dmg" \
            --pattern "Gap.Map_*_x64.dmg" \
            --pattern "Gap.Map_aarch64.app.tar.gz" \
            --pattern "Gap.Map_x64.app.tar.gz" \
            --pattern "Gap.Map_*_x64_en-US.msi" \
            --pattern "Gap.Map_*_x64-setup.exe" 2>&1 | tail -8 || true
          ls -lh ./pub/ | head -15

      - name: Rename + rezip for public convention
        run: |
          set -euo pipefail
          cd ./pub
          NUM="${VER#v}"
          # mac arm64: aarch64 → arm64 in the DMG filename
          if [ -f "Gap.Map_${NUM}_aarch64.dmg" ]; then
            mv "Gap.Map_${NUM}_aarch64.dmg" "Gap.Map_${NUM}_arm64.dmg"
            echo "  renamed: Gap.Map_${NUM}_arm64.dmg"
          fi
          # mac .app.tar.gz → .zip (extract + zip via ditto so the bundle's
          # macOS-extended-attribute codesignature stays intact — `tar` would
          # silently strip the xattrs).
          for tar in Gap.Map_aarch64.app.tar.gz Gap.Map_x64.app.tar.gz; do
            [ -f "$tar" ] || continue
            case "$tar" in
              *aarch64*) arch=arm64 ;;
              *x64*)     arch=x64 ;;
            esac
            tmp=$(mktemp -d)
            tar -xzf "$tar" -C "$tmp"
            APP=$(find "$tmp" -maxdepth 1 -name "*.app" -type d | head -1)
            if [ -n "$APP" ]; then
              # On Linux runners ditto isn't installed — fall back to `zip`
              # which preserves the directory structure even if it can't
              # preserve macOS-specific xattrs. The .app inside is already
              # signed + stapled; consumers staple-validate against the
              # ticket Apple embedded, not against xattrs that survive
              # transport.
              (cd "$tmp" && zip -qry "../../Gap.Map_${NUM}_${arch}.zip" "$(basename "$APP")")
              mv "/tmp/Gap.Map_${NUM}_${arch}.zip" "./Gap.Map_${NUM}_${arch}.zip" 2>/dev/null || true
              echo "  rezipped: Gap.Map_${NUM}_${arch}.zip"
            fi
            rm -rf "$tmp" "$tar"
          done
          ls -lh

      - name: Ensure public release exists (create draft if first run)
        run: |
          if ! gh release view "$VER" --repo "$PUBLIC" >/dev/null 2>&1; then
            gh release create "$VER" --repo "$PUBLIC" --target main --draft \
              --title "Gap Map $VER" \
              --notes "Release artifacts attached. See repo CHANGELOG for details."
            echo "  created draft on $PUBLIC"
          else
            echo "  $VER already exists on $PUBLIC"
          fi

      - name: Upload all artifacts to public release
        run: |
          cd ./pub
          # All file patterns matching the public-convention names
          shopt -s nullglob
          FILES=(Gap.Map_*_arm64.dmg Gap.Map_*_arm64.zip \
                 Gap.Map_*_x64.dmg   Gap.Map_*_x64.zip \
                 Gap.Map_*_x64_en-US.msi Gap.Map_*_x64-setup.exe)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::no artifacts found to upload"
            exit 1
          fi
          echo "  uploading: ${FILES[@]}"
          gh release upload "$VER" --repo "$PUBLIC" "${FILES[@]}" --clobber

      - name: Apply friendly asset labels
        run: |
          set -euo pipefail
          declare -A LABELS=(
            ["_arm64.dmg"]="macOS — Apple Silicon (.dmg, signed)"
            ["_arm64.zip"]="macOS — Apple Silicon (.app, zipped)"
            ["_x64.dmg"]="macOS — Intel (.dmg, signed)"
            ["_x64.zip"]="macOS — Intel (.app, zipped)"
            ["_x64-setup.exe"]="Windows — installer (.exe)"
            ["_x64_en-US.msi"]="Windows — installer (.msi)"
          )
          gh release view "$VER" --repo "$PUBLIC" --json assets \
            --jq '.assets[] | "\(.apiUrl)\t\(.name)"' \
          | while IFS=$'\t' read -r url name; do
            for suffix in "${!LABELS[@]}"; do
              if [[ "$name" == *"$suffix" ]]; then
                asset_id="${url##*/}"
                gh api -X PATCH "repos/$PUBLIC/releases/assets/$asset_id" \
                  -f label="${LABELS[$suffix]}" >/dev/null && \
                  echo "  ✓ $name → ${LABELS[$suffix]}"
                break
              fi
            done
          done

      - name: Publish (flip draft → latest)
        run: |
          gh release edit "$VER" --repo "$PUBLIC" --draft=false --latest
          echo ""
          echo "  ✓ Published: https://github.com/$PUBLIC/releases/tag/$VER"
