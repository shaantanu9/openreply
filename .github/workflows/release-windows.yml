name: release (windows)

# Windows-only release path — splits out from the monolithic release.yml
# so windows users get their MSI/EXE the moment the windows build finishes
# (~14 min), instead of being one of three matrix jobs that all gate
# the public release.
#
# Triggers on v* tag push (parallel with release-mac.yml + release-linux.yml).
# Each platform workflow uploads its own artifact to myind-ai/gapmap;
# the last to finish promotes draft → latest published via
# scripts/promote-release-if-complete.sh.
#
# Tier 1 caches added (vs the old release.yml's windows path):
#   - sccache → 30-50% Rust compile reduction (Windows hits the largest
#     dep tree because of webview2-com bindings, so this is the biggest
#     single win in the whole pipeline).
#   - PyInstaller dist cache → if Python source + deps unchanged, skip
#     the 3m 15s rebuild and restore from cache.
#   - ONNX model cache.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.4)'
        required: true
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  windows:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      # ---------- sccache for Rust (biggest single win on Windows) ----------
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      # ---------- Python sidecar ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps
        shell: bash
        run: uv sync --frozen --all-extras || uv sync --all-extras

      - name: Cache ONNX MiniLM embedding model
        uses: actions/cache@v4
        with:
          path: scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz
          key: onnx-minilm-l6-v2-v1

      - name: Pre-download ONNX MiniLM (if not cached)
        shell: bash
        run: |
          mkdir -p scripts/onnx-model-cache/all-MiniLM-L6-v2
          if [ ! -f scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz ]; then
            curl -fsSL --retry 3 --retry-delay 2 \
              -o scripts/onnx-model-cache/all-MiniLM-L6-v2/onnx.tar.gz \
              https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz
          else
            echo "  ✓ ONNX tarball restored from cache"
          fi

      - name: Cache PyInstaller dist
        id: pyi-cache
        uses: actions/cache@v4
        with:
          path: dist/gapmap-cli.exe
          key: pyinstaller-windows-${{ hashFiles('gapmap-cli.spec', 'pyproject.toml', 'uv.lock', 'src/**/*.py') }}

      - name: Build gapmap-cli sidecar (PyInstaller)
        if: steps.pyi-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: uv run pyinstaller gapmap-cli.spec

      - name: Stage sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path app-tauri/src-tauri/binaries | Out-Null
          Copy-Item dist/gapmap-cli.exe "app-tauri/src-tauri/binaries/gapmap-cli-x86_64-pc-windows-msvc.exe"

      # Windows has no ffmpeg sidecar — strip externalBin so tauri-bundler
      # doesn't fail looking for it.
      - name: Strip ffmpeg externalBin
        shell: bash
        run: |
          cd app-tauri/src-tauri
          python3 -c "import json, pathlib; p=pathlib.Path('tauri.conf.json'); d=json.loads(p.read_text()); d['bundle']['externalBin']=[b for b in d['bundle']['externalBin'] if 'ffmpeg' not in b]; p.write_text(json.dumps(d, indent=2))"

      # ---------- JWT ----------
      - name: Set JWT_DESKTOP_SECRET fallback if not provided
        shell: bash
        run: |
          if [ -z "${{ secrets.JWT_DESKTOP_SECRET }}" ]; then
            echo "JWT_DESKTOP_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV
          else
            echo "JWT_DESKTOP_SECRET=${{ secrets.JWT_DESKTOP_SECRET }}" >> $GITHUB_ENV
          fi

      # ---------- Node + Rust toolchains ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app-tauri/src-tauri -> target
          shared-key: windows-tauri

      - name: Install frontend deps
        working-directory: ./app-tauri
        run: npm ci

      # ---------- Build + upload to gap-map-pro draft ----------
      - name: Build and release Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_DESKTOP_SECRET: ${{ env.JWT_DESKTOP_SECRET }}
        with:
          projectPath: ./app-tauri
          tagName: v__VERSION__
          releaseName: Gap Map v__VERSION__
          releaseBody: |
            Download the installer for your platform below.

            - macOS (Apple Silicon): `*_arm64.dmg`
            - macOS (Intel): `*_x64.dmg`
            - Windows: `*_x64_en-US.msi` / `*_x64-setup.exe`
            - Linux: `*.AppImage` / `*.deb`
          releaseDraft: true
          prerelease: false
          args: ''

      # ---------- Publish to public repo ----------
      - name: Publish windows artifact to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          GH_TOKEN_SRC: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ env.TAG_NAME }}
          PUBLIC: ${{ vars.PUBLIC_RELEASE_REPO || 'myind-ai/gapmap' }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PUBLIC_RELEASE_TOKEN not set — skipping public publish"
            exit 0
          fi
          mkdir -p ./pub
          GH_TOKEN="$GH_TOKEN_SRC" gh release download "$VER" \
            --repo "${{ github.repository }}" --dir ./pub \
            --pattern "Gap.Map_*_x64_en-US.msi" \
            --pattern "Gap.Map_*_x64-setup.exe" 2>&1 | tail -5 || true
          ls -lh ./pub/ | head -10

          # Rename to user-friendly public-convention names — keep in
          # sync with release-mac.yml + release-linux.yml + scripts/
          # promote-release-if-complete.sh. .msi is the WiX-built MSI
          # for managed deployment; -Installer.exe is the NSIS click-
          # to-install variant. Both are kept because IT admins prefer
          # .msi and home users prefer .exe.
          cd ./pub
          NUM="${VER#v}"
          if [ -f "Gap.Map_${NUM}_x64_en-US.msi" ]; then
            mv "Gap.Map_${NUM}_x64_en-US.msi" "Gap-Map-${NUM}-Windows.msi"
          fi
          if [ -f "Gap.Map_${NUM}_x64-setup.exe" ]; then
            mv "Gap.Map_${NUM}_x64-setup.exe" "Gap-Map-${NUM}-Windows-Installer.exe"
          fi
          ls -lh

          if ! gh release view "$VER" --repo "$PUBLIC" >/dev/null 2>&1; then
            # Pull this version's real changelog section from CHANGELOG.md
            # (between its "## [vX.Y.Z ...]" header and the next "## [" header).
            # No private-repo links in public notes.
            CHANGES=$(awk -v ver="$VER" '$0 ~ ("^## \\[" ver "[^0-9.]") {f=1; next} f && /^## \[/{exit} f{print}' "$GITHUB_WORKSPACE/CHANGELOG.md")
            if [ -z "$CHANGES" ]; then CHANGES="- See the in-app changelog (Settings → About) for what changed."; fi
            {
              printf '## Gap Map %s\n\n' "$VER"
              printf '**Download → [gapmap.myind.ai](https://gapmap.myind.ai/)**\n\n'
              printf 'Installers:\n\n'
              printf -- '- **macOS Apple Silicon** — `Gap-Map-*-macOS-Apple-Silicon.dmg`\n'
              printf -- '- **macOS Intel** — `Gap-Map-*-macOS-Intel.dmg`\n'
              printf -- '- **Windows** — `Gap-Map-*-Windows.msi` (managed deploy) or `Gap-Map-*-Windows-Installer.exe` (click-to-install)\n'
              printf -- '- **Linux** — `Gap-Map-*-Linux.AppImage` (portable) or `Gap-Map-*-Linux.deb` (Debian/Ubuntu APT)\n\n'
              printf "## What's changed\n"
              printf '%s\n' "$CHANGES"
            } > "$RUNNER_TEMP/release-notes.md"
            gh release create "$VER" --repo "$PUBLIC" --target main --draft \
              --title "Gap Map $VER" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
            echo "  ✓ created draft on $PUBLIC"
          fi

          shopt -s nullglob
          FILES=(Gap-Map-*-Windows.msi Gap-Map-*-Windows-Installer.exe)
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$VER" --repo "$PUBLIC" "${FILES[@]}" --clobber
            echo "  ✓ uploaded ${#FILES[@]} windows artifact(s)"
          fi

      # ---------- Promote if all platforms uploaded ----------
      # Inlined — see release-mac.yml for why (script-file-missing
      # protection when checkout is pinned to a pre-fix tag).
      - name: Promote release to latest if all platforms are uploaded
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          VER: ${{ env.TAG_NAME }}
          PUBLIC: ${{ vars.PUBLIC_RELEASE_REPO || 'myind-ai/gapmap' }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then exit 0; fi
          echo "── promote-if-complete: $VER on $PUBLIC ──"
          ASSETS=$(gh release view "$VER" --repo "$PUBLIC" --json assets --jq '.assets[].name' 2>/dev/null) || {
            echo "  release $VER not found on $PUBLIC — nothing to promote"; exit 0
          }
          echo "  current assets:"; echo "$ASSETS" | sed 's/^/    - /'
          # Required patterns — friendly names produced by all 3
          # platform workflows' rename steps. Keep in sync.
          REQUIRED=(
            '-macOS-Apple-Silicon\.dmg$'
            '-macOS-Intel\.dmg$'
            '-Windows\.msi$|-Windows-Installer\.exe$'
          )
          MISSING=()
          for pat in "${REQUIRED[@]}"; do
            echo "$ASSETS" | grep -qE "$pat" || MISSING+=("$pat")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "  ⏳ waiting on missing platforms:"
            for m in "${MISSING[@]}"; do echo "    - $m"; done
            echo "  release stays draft. NOT promoting."; exit 0
          fi
          IS_DRAFT=$(gh release view "$VER" --repo "$PUBLIC" --json isDraft --jq '.isDraft' 2>/dev/null)
          if [ "$IS_DRAFT" = "true" ]; then
            echo "  ✓ all required platforms present — flipping draft → latest published"
            gh release edit "$VER" --repo "$PUBLIC" --draft=false --latest
            echo "  ✓ promoted $VER to latest on $PUBLIC"
          else
            echo "  already published — nothing to do"
          fi
