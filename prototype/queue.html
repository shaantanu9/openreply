<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Queue — OpenReply</title>
<script>try{if((localStorage.getItem('or-theme')||'dark')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{reddit:{DEFAULT:'#ff4500',hi:'#ff5700'},brand:'#0079d3'}}}}</script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-800 dark:text-zinc-200 antialiased">
<div class="flex min-h-screen">
  <aside id="side"></aside>
  <main class="w-full max-w-6xl flex-1 px-8 py-7">
    <div class="mb-5 flex items-start justify-between gap-4">
      <div><h1 class="text-2xl font-bold text-zinc-900 dark:text-white">Queue</h1>
        <p class="text-zinc-500 dark:text-zinc-400">Drafts &amp; scheduled content. Publishing is manual now (auto-publish later).</p></div>
      <a href="compose.html" class="rounded-full border border-zinc-200 dark:border-zinc-700 px-4 py-2 text-sm font-semibold">+ New content</a>
    </div>

    <div class="mb-4 flex flex-wrap items-center gap-2">
      <div id="filters" class="flex flex-wrap gap-2">
        <button data-filter="all" class="rounded-full bg-reddit px-3 py-1 text-sm font-semibold text-white">All <span class="ml-1 opacity-80">0</span></button>
        <button data-filter="draft" class="rounded-full border border-zinc-200 dark:border-zinc-700 px-3 py-1 text-sm text-zinc-500">Drafts <span class="ml-1 opacity-80">0</span></button>
        <button data-filter="scheduled" class="rounded-full border border-zinc-200 dark:border-zinc-700 px-3 py-1 text-sm text-zinc-500">Scheduled <span class="ml-1 opacity-80">0</span></button>
        <button data-filter="posted" class="rounded-full border border-zinc-200 dark:border-zinc-700 px-3 py-1 text-sm text-zinc-500">Posted <span class="ml-1 opacity-80">0</span></button>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <label class="text-sm text-zinc-500 dark:text-zinc-400">When
          <select id="dateFilter" class="ml-1 rounded-lg border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 px-2 py-1 text-sm">
            <option value="all">All time</option>
            <option value="month">This month</option>
            <option value="30">Last 30 days</option>
            <option value="older">Older</option>
          </select>
        </label>
        <label class="text-sm text-zinc-500 dark:text-zinc-400">Sort
          <select id="sort" class="ml-1 rounded-lg border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 px-2 py-1 text-sm">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>
        </label>
      </div>
    </div>

    <div class="overflow-hidden rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">
      <table class="w-full text-sm">
        <thead><tr class="text-left text-xs uppercase tracking-wide text-zinc-400">
          <th class="px-4 py-3">Type</th><th class="px-4 py-3">Content</th><th class="px-4 py-3">Platform</th><th class="px-4 py-3">Status / when</th><th class="px-4 py-3"></th></tr></thead>
        <tbody id="queueBody" class="divide-y divide-zinc-100 dark:divide-zinc-800/70"></tbody>
      </table>
      <div id="empty" class="hidden p-8 text-center text-sm text-zinc-500 dark:text-zinc-400">No posts match the current filters.</div>
    </div>
  </main>
</div>
<script src="app.js"></script>
<script>
const posts = [
  {id:1, type:'thread', content:'1/ The 3 reasons students abandon note apps…', platform:'X', status:'scheduled', date:'2026-07-29T09:00:00', meta:'Tomorrow 9:00'},
  {id:2, type:'post', content:'Manual note tagging is where note apps go to die…', platform:'X', status:'scheduled', date:'2026-08-01T12:30:00', meta:'Fri 12:30'},
  {id:3, type:'reply', content:'For messy lecture notes, the trick is auto-tagging…', platform:'Reddit', status:'draft', date:'2026-07-28T10:00:00', meta:'r/GetStudying'},
  {id:4, type:'article', content:'Why folders fail for lecture notes — and what replaces them', platform:'LinkedIn', status:'draft', date:'2026-04-12T00:00:00', meta:''},
  {id:5, type:'post', content:'Plain text + auto-link beats folders. Here\'s why…', platform:'LinkedIn', status:'posted', date:'2026-04-10T00:00:00', meta:'412 views'},
];

const statusBadge = {
  scheduled: ['bg-emerald-500/15 text-emerald-500', 'scheduled'],
  draft: ['bg-amber-500/15 text-amber-500', 'draft'],
  posted: ['bg-zinc-500/15 text-zinc-400', 'posted'],
};
const typeBadge = {
  reply: ['bg-reddit/15 text-reddit', 'reply'],
  thread: ['bg-indigo-500/15 text-indigo-400', 'thread'],
  post: ['bg-indigo-500/15 text-indigo-400', 'post'],
  article: ['bg-indigo-500/15 text-indigo-400', 'article'],
};

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
function fmtWhen(p) {
  if (p.status === 'posted') return p.meta ? fmtDate(p.date) + ' · ' + p.meta : fmtDate(p.date);
  if (p.status === 'scheduled') return fmtDate(p.date) + ' · ' + p.meta;
  return p.meta || fmtDate(p.date);
}
function actionBtn(p) {
  if (p.status === 'draft' && p.type === 'reply') return `<button class="rounded-full bg-reddit px-3 py-1 text-xs font-semibold text-white">Post</button>`;
  if (p.status === 'posted') return `<button class="text-xs font-semibold text-zinc-500 hover:text-zinc-900 dark:hover:text-white">View</button>`;
  return `<button class="text-xs font-semibold text-zinc-500 hover:text-zinc-900 dark:hover:text-white">Edit</button>`;
}

let currentFilter = 'all';
let currentDateFilter = 'all';
let currentSort = 'newest';

function countBy(status) {
  return posts.filter(p => status === 'all' || p.status === status).length;
}
function inDateBucket(iso) {
  const d = new Date(iso);
  const now = new Date();
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const thirtyDaysAgo = new Date(now); thirtyDaysAgo.setDate(now.getDate() - 30);
  if (currentDateFilter === 'month') return d >= startOfMonth;
  if (currentDateFilter === '30') return d >= thirtyDaysAgo;
  if (currentDateFilter === 'older') return d < thirtyDaysAgo;
  return true;
}
function render() {
  let list = posts.filter(p => (currentFilter === 'all' || p.status === currentFilter) && inDateBucket(p.date));
  list.sort((a,b) => currentSort === 'newest' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date));

  document.getElementById('queueBody').innerHTML = list.map(p => {
    const [sc, sl] = statusBadge[p.status];
    const [tc, tl] = typeBadge[p.type] || typeBadge.post;
    return `<tr><td class="px-4 py-3"><span class="rounded ${tc} px-2 py-0.5 text-xs font-bold">${tl}</span></td>
      <td class="px-4 py-3">${p.content}</td>
      <td class="px-4 py-3 text-zinc-500">${p.platform}</td>
      <td class="px-4 py-3"><span class="rounded ${sc} px-2 py-0.5 text-xs font-bold">${sl}</span> <span class="text-zinc-500">${fmtWhen(p)}</span></td>
      <td class="px-4 py-3">${actionBtn(p)}</td></tr>`;
  }).join('');

  document.getElementById('empty').classList.toggle('hidden', list.length > 0);

  document.querySelectorAll('#filters button').forEach(b => {
    const f = b.dataset.filter;
    const active = f === currentFilter;
    b.className = active
      ? 'rounded-full bg-reddit px-3 py-1 text-sm font-semibold text-white'
      : 'rounded-full border border-zinc-200 dark:border-zinc-700 px-3 py-1 text-sm text-zinc-500';
    b.querySelector('span').textContent = countBy(f);
  });
}

document.getElementById('filters').addEventListener('click', e => {
  const b = e.target.closest('button[data-filter]');
  if (!b) return;
  currentFilter = b.dataset.filter;
  render();
});
document.getElementById('dateFilter').addEventListener('change', e => { currentDateFilter = e.target.value; render(); });
document.getElementById('sort').addEventListener('change', e => { currentSort = e.target.value; render(); });
render();
</script>
</body></html>
