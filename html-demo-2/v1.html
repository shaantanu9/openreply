<!DOCTYPE html>

    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Files Manager - Desktop App</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    </head>
    <body class="bg-slate-50">
        <div class="flex h-screen">
            <!-- Sidebar -->
            <div class="w-16 bg-white border-r border-slate-200 flex flex-col items-center py-6 gap-6">
                <div class="w-8 h-8 bg-blue-600 rounded-lg"></div>
                <nav class="flex flex-col gap-4 flex-1">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600">📁</div>
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400">🔍</div>
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400">⭐</div>
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400">🔔</div>
                </nav>
                <div class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400">⚙️</div>
            </div>
    
            <!-- Main Content -->
            <div class="flex-1 flex flex-col">
                <!-- Top Bar -->
                <div class="bg-white border-b border-slate-200 px-8 py-6 flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-semibold text-slate-900">Files</h1>
                    </div>
                    <div class="flex gap-3">
                        <input type="text" placeholder="Search files..." class="px-4 py-2 bg-slate-100 rounded-lg text-sm text-slate-600 placeholder-slate-400 w-64"/>
                        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">+ New File</button>
                    </div>
                </div>
    
                <!-- Filters -->
                <div class="bg-white border-b border-slate-200 px-8 py-4 flex gap-4">
                    <select class="px-3 py-1.5 text-sm text-slate-700 bg-slate-50 border border-slate-200 rounded-lg">
                        <option>Type</option>
                        <option>Document</option>
                        <option>Spreadsheet</option>
                    </select>
                    <select class="px-3 py-1.5 text-sm text-slate-700 bg-slate-50 border border-slate-200 rounded-lg">
                        <option>Location</option>
                        <option>Desktop</option>
                        <option>Downloads</option>
                    </select>
                    <select class="px-3 py-1.5 text-sm text-slate-700 bg-slate-50 border border-slate-200 rounded-lg">
                        <option>People</option>
                        <option>Me</option>
                        <option>Team</option>
                    </select>
                </div>
    
                <!-- Content Grid -->
                <div class="flex-1 overflow-auto px-8 py-8">
                    <div class="grid grid-cols-4 gap-8">
                        <!-- Folder -->
                        <div class="cursor-pointer group">
                            <div class="bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg h-32 flex items-center justify-center text-white text-4xl mb-3 group-hover:shadow-lg transition">📁</div>
                            <h3 class="font-medium text-slate-900">Financial Reports</h3>
                            <p class="text-sm text-slate-500">12 files</p>
                        </div>
                        <div class="cursor-pointer group">
                            <div class="bg-gradient-to-br from-purple-400 to-purple-600 rounded-lg h-32 flex items-center justify-center text-white text-4xl mb-3 group-hover:shadow-lg transition">📁</div>
                            <h3 class="font-medium text-slate-900">Presentations</h3>
                            <p class="text-sm text-slate-500">8 files</p>
                        </div>
                        <div class="cursor-pointer group">
                            <div class="bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-lg h-32 flex items-center justify-center text-white text-4xl mb-3 group-hover:shadow-lg transition">📁</div>
                            <h3 class="font-medium text-slate-900">Meeting Notes</h3>
                            <p class="text-sm text-slate-500">24 files</p>
                        </div>
                        <div class="cursor-pointer group">
                            <div class="bg-gradient-to-br from-orange-400 to-orange-600 rounded-lg h-32 flex items-center justify-center text-white text-4xl mb-3 group-hover:shadow-lg transition">📁</div>
                            <h3 class="font-medium text-slate-900">Project Plans</h3>
                            <p class="text-sm text-slate-500">6 files</p>
                        </div>
                    </div>
    
                    <h2 class="text-lg font-semibold text-slate-900 mt-12 mb-6">Recent Files</h2>
                    <div class="grid grid-cols-4 gap-8">
                        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden hover:shadow-md transition cursor-pointer">
                            <div class="h-24 bg-slate-100 flex items-center justify-center">📄</div>
                            <div class="p-4">
                                <p class="font-medium text-slate-900 text-sm">Q3_Budget.xlsx</p>
                                <p class="text-xs text-slate-500 mt-1">2.4 MB</p>
                            </div>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden hover:shadow-md transition cursor-pointer">
                            <div class="h-24 bg-slate-100 flex items-center justify-center">📄</div>
                            <div class="p-4">
                                <p class="font-medium text-slate-900 text-sm">Proposal.docx</p>
                                <p class="text-xs text-slate-500 mt-1">1.2 MB</p>
                            </div>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden hover:shadow-md transition cursor-pointer">
                            <div class="h-24 bg-slate-100 flex items-center justify-center">📊</div>
                            <div class="p-4">
                                <p class="font-medium text-slate-900 text-sm">Analytics.pptx</p>
                                <p class="text-xs text-slate-500 mt-1">5.8 MB</p>
                            </div>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden hover:shadow-md transition cursor-pointer">
                            <div class="h-24 bg-slate-100 flex items-center justify-center">📄</div>
                            <div class="p-4">
                                <p class="font-medium text-slate-900 text-sm">Minutes.pdf</p>
                                <p class="text-xs text-slate-500 mt-1">890 KB</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    </html>
