<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenReply — Activation help (moved)</title>
<script src="env.config.js" defer></script>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F4EFE6; color: #2E2820;
    display: flex; align-items: center; justify-content: center; padding: 2rem;
  }
  .card {
    max-width: 460px; padding: 2rem 2.25rem;
    background: #fff; border-radius: 20px;
    border: 1px solid rgba(30,20,10,0.15); text-align: center;
  }
  h1 { font-size: 22px; margin: 0 0 0.75rem; color: #1C1710; }
  p  { font-size: 14px; line-height: 1.55; margin: 0 0 1rem; color: #6B6259; }
  a.btn {
    display: inline-block; background: #E07B3C; color: #fff;
    padding: 10px 18px; border-radius: 10px; text-decoration: none;
    font-weight: 500; font-size: 14px;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Activation help has moved.</h1>
    <p>
      The help page now lives in the new OpenReply web app. If you are not
      redirected automatically, use the link below.
    </p>
    <p><a id="helpLink" class="btn" href="/activation-help">Open help</a></p>
  </div>
<script>
  (function () {
    var env = (typeof window !== 'undefined' && window.OPENREPLY_ENV) || {};
    var base = (env.OPENREPLY_APP_BASE || env.LICENSE_API_BASE || '').replace(/\/$/, '');
    var target = (base ? base + '/activation-help' : '/activation-help');
    var link = document.getElementById('helpLink');
    if (link) link.href = target;
    setTimeout(function () { window.location.replace(target); }, 1200);
  })();
</script>
</body>
</html>
