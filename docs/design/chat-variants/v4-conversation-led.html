<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V4 · Conversation-Led — Gap Map</title>
<link rel="stylesheet" href="core.css"/>
<style>
  /* V4 — Conversation-Led: chat is the primary surface (a research assistant).
     Graph rides on top as a wide companion; each answer ANIMATES a relation
     path-trace across the tree. Insights/lenses live in slim collapsible rails. */
  .app { display:grid; grid-template-rows:52px 1fr; height:100vh; }
  .body { display:grid; grid-template-columns:44px minmax(0,1fr) 44px; min-height:0; }
  .body.left-open  { grid-template-columns:320px minmax(0,1fr) 44px; }
  .body.right-open { grid-template-columns:44px minmax(0,1fr) 300px; }
  .body.left-open.right-open { grid-template-columns:320px minmax(0,1fr) 300px; }
  .body { transition:grid-template-columns .28s ease; }
  .rail { background:var(--panel); display:flex; flex-direction:column; align-items:center; gap:10px; padding:12px 0; }
  .rail.l { border-right:1px solid var(--border); } .rail.r { border-left:1px solid var(--border); }
  .rail-btn { width:30px; height:30px; border-radius:9px; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:14px; }
  .rail-btn:hover { border-color:var(--accent); }
  .rail-txt { writing-mode:vertical-rl; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
  .panel { background:var(--panel); overflow-y:auto; padding:12px 14px; min-width:0; }
  .panel.l { border-right:1px solid var(--border); } .panel.r { border-left:1px solid var(--border); }
  .rail.hide, .panel.hide { display:none; }

  .center { display:grid; grid-template-rows:1fr auto; min-height:0; min-width:0; }
  .graphwrap { position:relative; min-height:0; min-width:0; }
  .gm-graph { position:absolute; inset:0; }
  .trace-tip { position:absolute; top:12px; left:16px; z-index:5; font-size:11px; color:var(--muted);
    background:rgba(255,255,255,.85); border:1px solid var(--border); border-radius:10px; padding:5px 10px; }

  /* hero chat */
  .chat { background:var(--panel); border-top:1px solid var(--border); box-shadow:0 -8px 24px rgba(26,22,20,.06);
    display:flex; flex-direction:column; height:42vh; }
  .chat-head { display:flex; align-items:center; gap:8px; padding:10px 18px 6px; font-size:12px; color:var(--muted); }
  .chat-head .dot { width:7px; height:7px; border-radius:50%; background:#5FB88C; }
  .chat .chat-log { flex:1; overflow-y:auto; padding:8px 18px; }
  .msg.bot .trace-btn { margin-top:8px; font-size:11px; font-weight:600; background:var(--bg); border:1px solid var(--border);
    color:var(--v-ink-2); border-radius:10px; padding:4px 10px; cursor:pointer; }
  .msg.bot .trace-btn:hover { border-color:var(--accent); color:var(--accent); }
  .chat .suggest-row { padding:0 18px 8px; } .chat .chat-composer { padding:8px 18px 14px; }
  .chat .chat-composer textarea { min-height:44px; }
  .perf-badge { font-size:10px; background:var(--v-mint-soft); color:#2f7a57; border:1px solid #bfe6d2; border-radius:10px; padding:2px 8px; font-weight:600; }
</style>
</head>
<body>
<div class="app">
  <header class="gm-header">
    <div class="gm-brand"><div class="gm-logo">G</div>
      <div><h1>Gap Map — note taking app</h1>
      <div class="subtitle">Conversation-led · answers trace the relation path</div></div></div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="body" id="body">
    <!-- left: rail + panel -->
    <div class="rail l" id="railL"><button class="rail-btn" id="openL" title="Insights">☰</button><div class="rail-txt">Insights</div></div>
    <aside class="panel l hide" id="panelL"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b style="font-size:12px">Insights</b><button class="rail-btn" id="closeL">‹</button></div><div id="insights"></div></aside>

    <div class="center">
      <div class="graphwrap"><svg class="gm-graph" id="graph"></svg>
        <div class="trace-tip" id="tip">Ask a question — I’ll walk the relation path through the graph.</div></div>
      <section class="chat">
        <div class="chat-head"><span class="dot"></span> Map assistant · grounded in this topic’s evidence</div>
        <div class="chat-log" id="log"></div>
        <div class="suggest-row" id="suggest"></div>
        <div class="chat-composer"><textarea id="input" rows="1" placeholder="Ask anything about these painpoints, products and gaps…"></textarea>
          <button class="chat-send" id="send">➤</button></div>
      </section>
    </div>

    <!-- right: rail + panel -->
    <div class="rail r" id="railR"><button class="rail-btn" id="openR" title="Lenses">⚡</button><div class="rail-txt">Lenses</div></div>
    <aside class="panel r hide" id="panelR"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b style="font-size:12px">Lenses</b><button class="rail-btn" id="closeR">›</button></div><div id="lenses"></div></aside>
  </div>
</div>
<div class="gm-footer">V4 · Conversation-Led · chat → animated path trace</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="core.js"></script>
<script>
const total = GM.applyStressFromURL();
const graph = GM.GapGraph("#graph", {});
GM.buildInsights(document.getElementById("insights"), graph);
GM.buildLenses(document.getElementById("lenses"), graph);
document.getElementById("stats").innerHTML =
  `<b>${total.toLocaleString()}</b> nodes · <b>${GM.DATA.links.length.toLocaleString()}</b> edges `
  + `<span class="perf-badge">${total>400?"skeleton mode":"full"}</span>`;

function toggleSide(side, open){
  const body=document.getElementById("body");
  const rail=document.getElementById(side==="l"?"railL":"railR");
  const panel=document.getElementById(side==="l"?"panelL":"panelR");
  body.classList.toggle(side==="l"?"left-open":"right-open", open);
  rail.classList.toggle("hide", open); panel.classList.toggle("hide", !open);
  setTimeout(()=>graph.resize(),320);
}
openL.onclick=()=>toggleSide("l",true); closeL.onclick=()=>toggleSide("l",false);
openR.onclick=()=>toggleSide("r",true); closeR.onclick=()=>toggleSide("r",false);

const log=document.getElementById("log"), input=document.getElementById("input"), sug=document.getElementById("suggest");
input.addEventListener("input",()=>{ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,120)+"px"; });
GM.ChatBrain.suggestions.forEach(s=>{ const c=document.createElement("button"); c.className="suggest-chip"; c.textContent=s; c.onclick=()=>{ input.value=s; sendMsg(); }; sug.appendChild(c); });
function bubble(cls,html){ const d=document.createElement("div"); d.className="msg "+cls; d.innerHTML=html; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }
function sendMsg(){
  const q=input.value.trim(); if(!q) return; bubble("user",q); input.value=""; input.style.height="auto";
  const t=bubble("bot",`<span class="typing"><i></i><i></i><i></i></span>`);
  setTimeout(()=>{
    const r=GM.ChatBrain.respond(q);
    document.getElementById("tip").textContent = `Tracing: ${r.path.map(id=>graph.get(id).label).join("  →  ")}`;
    graph.pathTrace(r.path);
    t.innerHTML = r.text + `<div><button class="trace-btn">↻ Replay path on graph</button></div>`;
    t.querySelector(".trace-btn").onclick=()=> graph.pathTrace(r.path);
    log.scrollTop=log.scrollHeight;
  },520);
}
document.getElementById("send").onclick=sendMsg;
input.addEventListener("keydown",e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMsg(); } });
window.addEventListener("resize", ()=> graph.resize());
</script>
</body>
</html>
