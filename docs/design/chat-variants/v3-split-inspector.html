<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V3 · Split Inspector — Gap Map</title>
<link rel="stylesheet" href="core.css"/>
<style>
  /* V3 — Split Inspector: left panel is TABBED (less scrolling); a slim lens
     toolbar floats over the graph; the right column fuses chat (top) with a
     live inspector of cited posts (bottom). Both side columns collapse. */
  .app { display:grid; grid-template-rows:52px 1fr; height:100vh; }
  main { display:grid; min-height:0;
    grid-template-columns:330px minmax(0,1fr) 360px; transition:grid-template-columns .28s ease; }
  main.left-collapsed  { grid-template-columns:40px minmax(0,1fr) 360px; }
  main.right-collapsed { grid-template-columns:330px minmax(0,1fr) 40px; }
  main.left-collapsed.right-collapsed { grid-template-columns:40px minmax(0,1fr) 40px; }
  .col { background:var(--panel); min-width:0; display:flex; flex-direction:column; }
  .col.left { border-right:1px solid var(--border); } .col.right { border-left:1px solid var(--border); }
  .col-head { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--border); }
  .col-head b { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .collapse-btn { width:24px; height:24px; border-radius:7px; border:1px solid var(--border); background:var(--bg);
    cursor:pointer; font-size:12px; color:var(--v-ink-2); }
  .collapse-btn:hover { border-color:var(--accent); color:var(--accent); }
  .col.collapsed > *:not(.col-head) { display:none; }
  .col.collapsed .col-head b { display:none; }

  /* tabs */
  .tabs { display:flex; gap:4px; padding:8px 10px 0; border-bottom:1px solid var(--border); }
  .tab { font-size:11px; font-weight:600; padding:7px 11px; border-radius:8px 8px 0 0; cursor:pointer;
    color:var(--muted); border:1px solid transparent; border-bottom:none; }
  .tab.active { color:var(--accent); background:var(--bg); border-color:var(--border); }
  .tabpane { display:none; padding:12px 14px; overflow-y:auto; flex:1; } .tabpane.active { display:block; }

  .graphwrap { position:relative; min-width:0; }
  .lensbar { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:5;
    display:flex; gap:6px; background:rgba(255,255,255,.9); backdrop-filter:blur(8px);
    border:1px solid var(--border); border-radius:14px; padding:6px 8px; box-shadow:var(--shadow-sm); }

  /* right column: chat top, inspector bottom */
  .chatzone { flex:1 1 55%; display:flex; flex-direction:column; min-height:0; border-bottom:1px solid var(--border); }
  .chatzone .chat-log { flex:1; overflow-y:auto; padding:12px 14px; }
  .chatzone .suggest-row { padding:0 14px 8px; } .chatzone .chat-composer { padding:8px 14px 12px; }
  .inspector { flex:1 1 45%; overflow-y:auto; padding:12px 14px; background:var(--surface-2); }
  .inspector h4 { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 8px; }
  .ev { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 11px; margin-bottom:7px; }
  .ev .ev-k { font-size:9px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); }
  .ev .ev-t { font-size:12px; font-weight:600; margin:3px 0; } .ev .ev-q { font-size:11px; color:var(--v-ink-2); font-style:italic; }
  .perf-badge { font-size:10px; background:var(--v-mint-soft); color:#2f7a57; border:1px solid #bfe6d2; border-radius:10px; padding:2px 8px; font-weight:600; }
</style>
</head>
<body>
<div class="app">
  <header class="gm-header">
    <div class="gm-brand"><div class="gm-logo">G</div>
      <div><h1>Gap Map — note taking app</h1>
      <div class="subtitle">Tabbed insights · chat + inspector rail</div></div></div>
    <div class="stats" id="stats"></div>
  </header>

  <main id="main">
    <aside class="col left" id="leftCol">
      <div class="col-head"><b>Insights</b><button class="collapse-btn" data-collapse="left">‹</button></div>
      <div class="tabs">
        <div class="tab active" data-tab="t-pain">Painpoints</div>
        <div class="tab" data-tab="t-fixes">Fixes</div>
        <div class="tab" data-tab="t-src">Sources</div>
      </div>
      <div class="tabpane active" id="t-pain"></div>
      <div class="tabpane" id="t-fixes"></div>
      <div class="tabpane" id="t-src"></div>
    </aside>

    <div class="graphwrap">
      <svg class="gm-graph" id="graph"></svg>
      <div class="lensbar" id="lenses"></div>
    </div>

    <aside class="col right" id="rightCol">
      <div class="col-head"><b>Chat &amp; inspector</b><button class="collapse-btn" data-collapse="right">›</button></div>
      <div class="chatzone">
        <div class="chat-log" id="log"></div>
        <div class="suggest-row" id="suggest"></div>
        <div class="chat-composer"><input id="input" placeholder="Ask the map…"/><button class="chat-send" id="send">➤</button></div>
      </div>
      <div class="inspector"><h4>Cited evidence</h4><div id="inspectorBody"><div class="empty">Cited posts from the conversation appear here.</div></div></div>
    </aside>
  </main>
</div>
<div class="gm-footer">V3 · Split Inspector · chat → highlight + cited posts</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="core.js"></script>
<script>
const total = GM.applyStressFromURL();
const graph = GM.GapGraph("#graph", { onNodeClick:n=>renderInspector([n.id]) });
GM.buildLenses(document.getElementById("lenses"), graph);

// split the shared insight builder output across the three tabs
const scratch=document.createElement("div"); GM.buildInsights(scratch, graph);
function moveCards(selector, target){ const host=scratch.querySelector(selector); if(host){ const wrap=document.createElement("div"); wrap.appendChild(host); document.getElementById(target).appendChild(wrap); } }
function cards(kinds, target){
  GM.DATA.nodes.filter(n=>kinds.includes(n.kind)).forEach(n=>{
    const c=document.createElement("div"); c.className="card"; c.dataset.node=n.id;
    c.innerHTML=`<div class="card-title">${n.label}</div><div class="card-meta"><span>${GM.KIND_LABEL[n.kind]}</span>${n.meta.freq?`<span>freq: ${n.meta.freq}</span>`:""}</div>`;
    c.onclick=()=>{ graph.focusNodeById(n.id); renderInspector([n.id]); };
    document.getElementById(target).appendChild(c);
  });
}
cards(["painpoint"],"t-pain"); cards(["workaround","feature_wish"],"t-fixes"); cards(["product","subreddit"],"t-src");

document.querySelectorAll(".tab").forEach(t=> t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".tabpane").forEach(x=>x.classList.remove("active"));
  t.classList.add("active"); document.getElementById(t.dataset.tab).classList.add("active");
});
document.querySelectorAll("[data-collapse]").forEach(btn=> btn.onclick=()=>{
  const side=btn.dataset.collapse, col=document.getElementById(side==="left"?"leftCol":"rightCol");
  col.classList.toggle("collapsed"); document.getElementById("main").classList.toggle(side+"-collapsed");
  setTimeout(()=>graph.resize(),320);
});
document.getElementById("stats").innerHTML =
  `<b>${total.toLocaleString()}</b> nodes · <b>${GM.DATA.links.length.toLocaleString()}</b> edges `
  + `<span class="perf-badge">${total>400?"skeleton mode":"full"}</span>`;

const log=document.getElementById("log"), input=document.getElementById("input"), sug=document.getElementById("suggest");
GM.ChatBrain.suggestions.forEach(s=>{ const c=document.createElement("button"); c.className="suggest-chip"; c.textContent=s; c.onclick=()=>{ input.value=s; sendMsg(); }; sug.appendChild(c); });
function bubble(cls,html){ const d=document.createElement("div"); d.className="msg "+cls; d.innerHTML=html; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }
function renderInspector(ids){
  const ev=[]; ids.forEach(id=> graph.neighborsOf(id).concat([graph.get(id)]).forEach(n=>{ if(n && (n.kind==="post"||n.kind==="comment"||n.meta.quote) && !ev.find(e=>e.id===n.id)) ev.push(n); }));
  const body=document.getElementById("inspectorBody");
  body.innerHTML = ev.length ? ev.map(n=>`<div class="ev"><div class="ev-k">${GM.KIND_LABEL[n.kind]}</div><div class="ev-t">${n.label}</div>${n.meta.quote?`<div class="ev-q">“${n.meta.quote}”</div>`:""}</div>`).join("") : `<div class="empty">No quoted evidence on this node.</div>`;
}
function sendMsg(){
  const q=input.value.trim(); if(!q) return; bubble("user",q); input.value="";
  const t=bubble("bot",`<span class="typing"><i></i><i></i><i></i></span>`);
  setTimeout(()=>{
    const r=GM.ChatBrain.respond(q); graph.highlight(r.cites); renderInspector(r.cites);
    const chips=r.cites.map(id=>{ const n=graph.get(id); return n?`<span class="cite-chip" data-id="${id}">${n.label}</span>`:""; }).join("");
    t.innerHTML=r.text+(chips?`<div class="cites">${chips}</div>`:"");
    t.querySelectorAll(".cite-chip").forEach(ch=> ch.onclick=()=>{ graph.focusNodeById(ch.dataset.id); renderInspector([ch.dataset.id]); });
    log.scrollTop=log.scrollHeight;
  },520);
}
document.getElementById("send").onclick=sendMsg; input.addEventListener("keydown",e=>{ if(e.key==="Enter") sendMsg(); });
window.addEventListener("resize", ()=> graph.resize());
</script>
</body>
</html>
