<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V2 · Focus Canvas — Gap Map</title>
<link rel="stylesheet" href="core.css"/>
<style>
  /* V2 — Focus Canvas: the graph is the whole stage. Insights + lenses are
     hidden, summoned as glass overlay drawers via floating pills. Chat slides
     up as a floating card and COLLAPSES the hairball to a clean sub-tree. */
  .app { display:grid; grid-template-rows:52px 1fr; height:100vh; }
  .stage { position:relative; overflow:hidden; }
  .gm-graph { position:absolute; inset:0; }

  /* floating summon pills */
  .pill { position:absolute; z-index:6; background:var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:7px; color:var(--v-ink-2); transition:all .15s; }
  .pill:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
  .pill.tl { top:16px; left:16px; } .pill.tr { top:16px; right:16px; }
  .pill.ask { bottom:24px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; border-color:var(--accent);
    padding:11px 22px; font-size:13px; box-shadow:0 8px 24px rgba(255,140,66,.35); }
  .pill.ask:hover { transform:translateX(-50%) translateY(-2px); color:#fff; }

  /* glass overlay drawers */
  .drawer { position:absolute; top:0; bottom:0; width:340px; z-index:8; background:rgba(255,255,255,.86);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--border);
    box-shadow:var(--shadow); overflow-y:auto; transition:transform .3s cubic-bezier(.2,.8,.2,1); }
  .drawer.left  { left:0; border-left:none; transform:translateX(-104%); }
  .drawer.right { right:0; border-right:none; transform:translateX(104%); }
  .drawer.open { transform:none; }
  .drawer-head { position:sticky; top:0; background:rgba(251,248,242,.9); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--border); }
  .drawer-head b { font-size:13px; } .drawer-body { padding:12px 14px; }
  .x-btn { width:26px; height:26px; border-radius:8px; border:1px solid var(--border); background:var(--bg);
    cursor:pointer; font-size:14px; line-height:1; }
  .x-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* accordion inside the left drawer — Insights + Lenses share one panel */
  .acc-head { width:100%; display:flex; align-items:center; justify-content:space-between;
    background:var(--surface-2); border:1px solid var(--border); border-radius:9px;
    padding:9px 11px; margin:0 0 8px; font-size:12px; font-weight:700; color:var(--v-ink);
    cursor:pointer; font-family:inherit; }
  .acc-head + .acc-body { margin-bottom:12px; }
  .acc-head:hover { border-color:var(--accent); }
  .acc-head .acc-caret { font-size:10px; color:var(--muted); transition:transform .2s; }
  .acc-head.collapsed .acc-caret { transform:rotate(-90deg); }
  .acc-body.collapsed { display:none; }

  /* Chat IS a drawer — it reuses .drawer + .drawer.right + .drawer.open exactly
     like Lenses (same slide-in, same docking, same open/close). This modifier
     just makes it a solid, flex-column chat sidebar instead of a scroll panel. */
  .drawer.chat { width:380px; z-index:9; background:var(--panel);
    backdrop-filter:none; -webkit-backdrop-filter:none;
    overflow:hidden; display:flex; flex-direction:column; }
  .chatcard-head { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); }
  .chatcard-head b { font-size:13px; } .drawer.chat .chat-log { flex:1; overflow-y:auto; padding:14px 14px; }
  .drawer.chat .suggest-row { padding:0 14px 8px; } .drawer.chat .chat-composer { padding:10px 14px 14px; }
  .relations-note { font-size:10px; color:var(--muted); padding:0 14px 8px; font-style:italic; }

  /* rich citations inside a chat answer — source label + kind + verbatim quote */
  .drawer.chat .msg.bot { max-width:100%; }
  .cite-block { margin-top:10px; border-top:1px solid var(--border); padding-top:8px; }
  .cite-acc-head { width:100%; display:flex; align-items:center; justify-content:space-between;
    background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:6px 9px;
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
    color:var(--muted); cursor:pointer; font-family:inherit; }
  .cite-acc-head:hover { border-color:var(--accent); color:var(--accent); }
  .cite-acc-head .acc-caret { font-size:9px; transition:transform .2s; }
  .cite-acc-head.collapsed .acc-caret { transform:rotate(-90deg); }
  .cite-acc-body { margin-top:6px; }
  .cite-acc-body.collapsed { display:none; }
  .cite-card { background:var(--bg); border:1px solid var(--border); border-left:3px solid var(--accent);
    border-radius:8px; padding:7px 9px; margin-bottom:6px; cursor:pointer;
    transition:border-color .15s, box-shadow .15s, transform .08s; }
  .cite-card:hover { border-color:var(--accent); box-shadow:var(--shadow-sm); }
  .cite-card:active { transform:translateY(1px); }
  .cite-card .cc-head { display:flex; align-items:center; gap:7px; }
  .cite-card .cc-dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .cite-card .cc-title { font-size:11.5px; font-weight:600; line-height:1.3; color:var(--v-ink); }
  .cite-card .cc-kind { margin-left:auto; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;
    background:var(--v-orange-soft); color:#9a4a12; border-radius:8px; padding:1px 6px; white-space:nowrap; }
  .cite-card .cc-quote { font-size:10.5px; color:var(--muted); font-style:italic; margin-top:4px; line-height:1.4;
    border-top:1px dashed var(--border); padding-top:4px; }
  .scrim { position:absolute; inset:0; z-index:7; background:rgba(26,22,20,.04); opacity:0; pointer-events:none; transition:opacity .25s; }
  .scrim.on { opacity:1; pointer-events:auto; }
  .perf-badge { font-size:10px; background:var(--v-mint-soft); color:#2f7a57; border:1px solid #bfe6d2; border-radius:10px; padding:2px 8px; font-weight:600; }
</style>
</head>
<body>
<div class="app">
  <header class="gm-header">
    <div class="gm-brand"><div class="gm-logo">G</div>
      <div><h1>Gap Map — note taking app</h1>
      <div class="subtitle">Graph-first · summon panels as needed</div></div></div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="stage" id="stage">
    <svg class="gm-graph" id="graph"></svg>
    <div class="scrim" id="scrim"></div>

    <button class="pill tl" id="pillLeft">☰ Insights & Lenses</button>
    <button class="pill ask" id="pillAsk">💬 Ask this map</button>

    <aside class="drawer left" id="drawerLeft">
      <div class="drawer-head"><b>Insights &amp; Lenses</b><button class="x-btn" data-close="drawerLeft">×</button></div>
      <div class="drawer-body">
        <button class="acc-head" data-acc="accInsights"><span>📊 Topic insights</span><span class="acc-caret">▾</span></button>
        <div class="acc-body" id="accInsights"><div id="insights"></div></div>
        <button class="acc-head" data-acc="accLenses"><span>⚡ Lenses</span><span class="acc-caret">▾</span></button>
        <div class="acc-body" id="accLenses"><div id="lenses"></div></div>
      </div>
    </aside>

    <aside class="drawer right chat" id="chatcard">
      <div class="chatcard-head"><b>💬 Ask this map</b>
        <button class="x-btn" data-close="chatcard">×</button></div>
      <div class="chat-log" id="log"></div>
      <div class="relations-note" id="relnote">Ask a question — the graph will focus on just the relevant finding and its evidence.</div>
      <div class="suggest-row" id="suggest"></div>
      <div class="chat-composer"><input id="input" placeholder="e.g. how do people organize notes?"/>
        <button class="chat-send" id="send">➤</button></div>
    </aside>
  </div>
</div>
<div class="gm-footer">V2 · Focus Canvas · chat → focus sub-tree</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="core.js"></script>
<script>
const total = GM.applyStressFromURL();
const graph = GM.GapGraph("#graph", {});
GM.buildInsights(document.getElementById("insights"), graph);
GM.buildLenses(document.getElementById("lenses"), graph);
document.getElementById("stats").innerHTML =
  `<b>${total.toLocaleString()}</b> nodes · <b>${GM.DATA.links.length.toLocaleString()}</b> edges `
  + `<span class="perf-badge">${total>400?"skeleton mode":"full"}</span>`;

const scrim = document.getElementById("scrim");
// chat is now a .drawer too, so ONE path opens any panel and closes the rest
function openDrawer(id){
  document.querySelectorAll(".drawer.open").forEach(d=> d.classList.remove("open"));
  document.getElementById(id).classList.add("open"); scrim.classList.add("on");
}
function closeAll(){ document.querySelectorAll(".drawer.open").forEach(d=>d.classList.remove("open")); scrim.classList.remove("on"); }
document.getElementById("pillLeft").onclick = ()=> openDrawer("drawerLeft");
document.getElementById("pillAsk").onclick = ()=>{ openDrawer("chatcard"); document.getElementById("input").focus(); };
document.querySelectorAll("[data-close]").forEach(b=> b.onclick=()=> closeAll());
scrim.onclick = closeAll;
// accordion: collapse/expand Insights & Lenses sections inside the left drawer
document.querySelectorAll(".acc-head").forEach(h=> h.onclick=()=>{
  const body=document.getElementById(h.getAttribute("data-acc"));
  h.classList.toggle("collapsed"); body.classList.toggle("collapsed");
});

const log=document.getElementById("log"), input=document.getElementById("input");
const sug=document.getElementById("suggest");
GM.ChatBrain.suggestions.forEach(s=>{ const c=document.createElement("button"); c.className="suggest-chip"; c.textContent=s; c.onclick=()=>{ input.value=s; sendMsg(); }; sug.appendChild(c); });
function bubble(cls,html){ const d=document.createElement("div"); d.className="msg "+cls; d.innerHTML=html; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }
function sendMsg(){
  const q=input.value.trim(); if(!q) return; bubble("user",q); input.value="";
  const t=bubble("bot",`<span class="typing"><i></i><i></i><i></i></span>`);
  setTimeout(()=>{
    const r=GM.ChatBrain.respond(q);
    graph.focusSubtree(r.cites[0], 2);          // collapse hairball → relevant sub-tree
    document.getElementById("relnote").textContent = `Showing the “${r.title}” sub-tree — ${r.cites.length} connected findings.`;
    // rich citations: each cited node renders as a card (source · kind · verbatim quote)
    const cards=r.cites.map(id=>{
      const n=graph.get(id); if(!n) return "";
      const color=GM.KIND_COLORS[n.kind]||"#bbb";
      const kind=GM.KIND_LABEL[n.kind]||n.kind;
      const quote=n.meta&&n.meta.quote?`<div class="cc-quote">“${n.meta.quote}”</div>`:"";
      return `<div class="cite-card" data-id="${id}">`
        +`<div class="cc-head"><span class="cc-dot" style="background:${color}"></span>`
        +`<span class="cc-title">${n.label}</span><span class="cc-kind">${kind}</span></div>${quote}</div>`;
    }).join("");
    const cites = cards
      ? `<div class="cite-block">`
        +`<button class="cite-acc-head" type="button"><span>📎 ${r.cites.length} citations</span><span class="acc-caret">▾</span></button>`
        +`<div class="cite-acc-body">${cards}</div></div>`
      : "";
    t.innerHTML=r.text+cites;
    // citations are a collapsible accordion inside the answer
    const ah=t.querySelector(".cite-acc-head");
    if(ah) ah.onclick=()=>{ ah.classList.toggle("collapsed"); t.querySelector(".cite-acc-body").classList.toggle("collapsed"); };
    t.querySelectorAll(".cite-card").forEach(ch=> ch.onclick=()=> graph.focusSubtree(ch.getAttribute("data-id"),2));
    log.scrollTop=log.scrollHeight;
  },520);
}
document.getElementById("send").onclick=sendMsg;
input.addEventListener("keydown",e=>{ if(e.key==="Enter") sendMsg(); });
window.addEventListener("resize", ()=> graph.resize());
</script>
</body>
</html>
