<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OpenReply</title>
<link rel="icon" type="image/png" href="/icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* The window is transparent + decorationless (see tauri.conf.json splash
     block). Anything that paints OUTSIDE the rounded card rectangle is what
     macOS renders as a visible "square" around the curve — external shadows,
     padded body backgrounds, etc. So: zero margin, zero padding, zero outer
     shadow. The card fills the entire window. The curve IS the window. */
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }
  .wrap {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 26px;
    background: #FFFFFF;
    color: #111111;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
    font-family: "Plus Jakarta Sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mark {
    position: relative;
    width: 72px;
    height: 72px;
    border-radius: 22px;
    display: block;
    object-fit: contain;
    box-shadow: 0 8px 28px rgba(255, 69, 0, 0.30);
    margin-bottom: 20px;
    z-index: 1;
  }
  .name { position: relative; z-index: 1; font-size: 20px; font-weight: 800; letter-spacing: -0.012em; margin-bottom: 5px; color: #111; }
  .sub  { position: relative; z-index: 1; font-size: 11.5px; color: #999; margin-bottom: 24px; letter-spacing: 0.02em; }
  .bar {
    z-index: 1;
    width: 170px;
    height: 4px;
    border-radius: 2px;
    background: #EBEBEB;
    overflow: hidden;
    position: relative;
  }
  .bar::after {
    content: "";
    position: absolute;
    inset: 0;
    width: 42%;
    background: linear-gradient(90deg, transparent, rgba(255, 69, 0, 0.95), transparent);
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bar::after { animation: none; width: 100%; opacity: .5; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <img class="mark" src="/icon.png" alt="OpenReply" />
    <div class="name">OpenReply</div>
    <div class="sub">social reply co-pilot</div>
    <div class="bar"></div>
  </div>
</body>
</html>
