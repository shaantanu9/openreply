<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gap Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* The window is transparent + decorationless (see tauri.conf.json splash
     block). Anything that paints OUTSIDE the rounded card rectangle is what
     macOS renders as a visible "square" around the curve — external shadows,
     padded body backgrounds, etc. So: zero margin, zero padding, zero outer
     shadow. The card fills the entire window. The curve IS the window. */
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }
  .wrap {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 26px;
    background:
      radial-gradient(140% 100% at 0% 0%, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0) 52%),
      radial-gradient(120% 100% at 100% 100%, rgba(255, 170, 120, 0.11) 0%, rgba(255, 170, 120, 0) 64%),
      linear-gradient(155deg, #FDFBF8 0%, #F6F2EA 52%, #EEE8DE 100%);
    color: #1A1614;
    overflow: hidden;
    /* INSET shadow only — any `0 10px 40px …` style outer shadow gets
       clipped to the window rectangle and renders as a visible square.
       The rim below reads as a softly lifted edge without any outer bleed. */
    box-shadow:
      inset 0 0 0 1px rgba(26, 22, 20, 0.06),
      inset 0 -1px 0 rgba(26, 22, 20, 0.06),
      inset 0 8px 28px rgba(255, 255, 255, 0.34);
    font-family: "Plus Jakarta Sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.02) 36%, rgba(26, 22, 20, 0.03) 100%);
    pointer-events: none;
  }
  .mark {
    position: relative;
    width: 72px;
    height: 72px;
    border-radius: 22px;
    background:
      radial-gradient(110% 100% at 18% 14%, rgba(255, 255, 255, 0.52) 0%, rgba(255, 255, 255, 0) 47%),
      linear-gradient(145deg, #FFB57D 0%, #FF9F62 34%, #FF7E3A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 31px;
    font-weight: 800;
    letter-spacing: -0.6px;
    color: #fff;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.55),
      inset 0 -8px 16px rgba(153, 66, 19, 0.22),
      0 10px 22px rgba(255, 140, 66, 0.35);
    margin-bottom: 20px;
    z-index: 1;
  }
  .mark::after {
    content: "";
    position: absolute;
    inset: 1px;
    border-radius: 21px;
    border: 1px solid rgba(255, 255, 255, 0.24);
    pointer-events: none;
  }
  .name { position: relative; z-index: 1; font-size: 20px; font-weight: 800; letter-spacing: -0.012em; margin-bottom: 5px; }
  .sub  { position: relative; z-index: 1; font-size: 11.5px; color: #8A8278; margin-bottom: 24px; letter-spacing: 0.02em; }
  .bar {
    z-index: 1;
    width: 170px;
    height: 4px;
    border-radius: 2px;
    background: rgba(26, 22, 20, 0.08);
    overflow: hidden;
    position: relative;
  }
  .bar::after {
    content: "";
    position: absolute;
    inset: 0;
    width: 42%;
    background: linear-gradient(90deg, transparent, rgba(255, 140, 66, 0.92), transparent);
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bar::after { animation: none; width: 100%; opacity: .5; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">G</div>
    <div class="name">Gap Map</div>
    <div class="sub">research workspace</div>
    <div class="bar"></div>
  </div>
</body>
</html>
